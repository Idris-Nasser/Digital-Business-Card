<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Digital Business Card</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>

    <body>
        <div class="profile-card">
            <!-- قسم الحالة الشخصية وحالة التوفر -->
            <div class="profile-image-container">
                <img src="/image/profile.png" alt="User Image">
                <span class="status-dot" title="متوفر للعمل حالياََ"></span>
            </div>

            <!-- الاسم والتخصص -->
            <h1 class="profile-name">Example Name</h1>
            <p class="profile-title">Front-End Developer</p>

            <!-- قسم المهارات -->
            <div class="skills">
                <h3>المهارات والتقنيات</h3>
                <div class="skill-container">
                    <span class="skill-page">C++</span>
                    <span class="skill-page">C#</span>
                    <span class="skill-page">HTML5</span>
                    <span class="skill-page">CSS</span>
                    <span class="skill-page">JavaScript</span>
                    <span class="skill-page">Git-GitHub</span>
                </div>
            </div>

            <!-- قسم التواصل -->
            <div class="contact-section">
                <h3 class="section-title">تواصل معي</h3>
                <a href="#" class="my-project" target="_blank">تصفح معرض أعمالي</a>
                <div class="contact-links">
                    <a class="contact-btn github" target="_blank" href="#">Git-GitHub</a>
                    <a class="contact-btn linkedin" target="_blank" href="#">LinkedIn</a>
                    <a class="contact-btn email" target="_blank" href="#">E-mail</a>
                    <a class="contact-btn whatsapp" target="_blank" href="#">WhatsApp</a>
                </div>
            </div>
        </div>
    </body>
</html>
